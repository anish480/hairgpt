<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HairGPT Widget Preview</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .preview-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: #2D2D2D;
      color: #fff;
      padding: 8px 16px;
      font-size: 13px;
      z-index: 9999999;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .preview-bar span { opacity: 0.7; }
    .preview-bar button {
      background: #7EC8B7;
      border: none;
      color: #fff;
      padding: 4px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    .preview-bar button:hover { opacity: 0.9; }
    .fake-site {
      margin-top: 40px;
      padding: 40px 20px;
      max-width: 1200px;
      margin-left: auto;
      margin-right: auto;
    }
    .fake-site h1 { color: #2D2D2D; margin-bottom: 8px; }
    .fake-site p { color: #666; max-width: 600px; }
  </style>
</head>
<body>
  <div class="preview-bar">
    <strong>HairGPT Preview</strong>
    <span>|</span>
    <span>Click the chat bubble to open the widget</span>
    <span>|</span>
    <button onclick="localStorage.removeItem('moxiebuddy_session');location.reload();">Reset Chat</button>
  </div>
  <div class="fake-site">
    <h1>Moxie Beauty</h1>
    <p>This is a simulated page background. The HairGPT chat widget floats on top of any page content.</p>
  </div>

  <script>
    window.MoxieBuddyConfig = {
      apiBaseUrl: "http://localhost:8000",
      shopContext: {
        pageType: "index",
        productHandle: "",
        customerId: "",
      }
    };
  </script>
  <script src="moxiebuddy-widget.js"></script>
</body>
</html>
