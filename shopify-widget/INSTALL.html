<!--
  MoxieBuddy Chat Widget — Shopify Installation Snippet
  =====================================================

  Add this block just before </body> in your Shopify theme's theme.liquid file.

  For the dev store (moxie-dev-store-soqsybgm.myshopify.com):
    1. Go to Online Store > Themes > Edit code
    2. Open layout/theme.liquid
    3. Paste this snippet just before the closing </body> tag
    4. Save

  For production, change the apiBaseUrl to "https://chat.moxiebeauty.in"
  and host the JS file on a CDN or Shopify's asset pipeline.
-->

<!-- MoxieBuddy Chat Widget Configuration -->
<script>
  window.MoxieBuddyConfig = {
    // DEV: point to local FastAPI backend
    apiBaseUrl: "http://localhost:8000",

    // PROD: uncomment this line and comment out the one above
    // apiBaseUrl: "https://chat.moxiebeauty.in",

    // Shopify page context (populated from Liquid template variables)
    shopContext: {
      pageType:      "{{ request.page_type }}",
      productHandle: "{{ product.handle | default: '' }}",
      collectionHandle: "{{ collection.handle | default: '' }}",
      customerId:    "{{ customer.id | default: '' }}",
      customerEmail: "{{ customer.email | default: '' }}",
      shopDomain:    "{{ shop.domain }}"
    }
  };
</script>
